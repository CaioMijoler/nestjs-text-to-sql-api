version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: text-to-sql-api
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-deepseek-coder-v2}
    depends_on:
      - redis
      - ollama
    networks:
      - backend

  # Local Redis for caching
  redis:
    image: redis:7-alpine
    container_name: text-to-sql-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - backend

  # Local Ollama for LLM
  ollama:
    image: ollama/ollama:latest
    container_name: text-to-sql-ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - backend

volumes:
  redis-data:
  ollama-data:

networks:
  backend:
    driver: bridge
